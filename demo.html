<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SALAMA — Dépôt de médicaments</title>
<style>
:root{--bg:#0a1628;--bg2:#0f1d32;--border:#1e3a5f;--primary:#10b981;--primary2:#059669;
 --text:#f8fafc;--text2:#94a3b8;--text3:#64748b;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--purple:#a855f7;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:var(--bg);color:var(--text)}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}
.hidden{display:none!important}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:360px;max-width:100%;text-align:center}
.logo-badge{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 16px}
.login-card h1{font-size:24px;font-weight:800;color:var(--primary)}
.login-card .sub{font-size:11px;color:var(--primary);letter-spacing:3px;text-transform:uppercase;margin-bottom:24px}
.field{text-align:left;margin-bottom:14px}
.field label{font-size:12px;color:var(--text3);display:block;margin-bottom:4px}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);outline:none;font-size:16px}
.app{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;overflow:hidden;z-index:50;transition:transform .3s}
.sidebar .brand{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sidebar .brand .b-ic{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sidebar .brand .b-t{font-size:17px;font-weight:700}
.sidebar .brand .b-s{font-size:9px;color:var(--primary);letter-spacing:2px;text-transform:uppercase}
nav{flex:1;padding:10px 8px;overflow-y:auto;min-height:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;color:var(--text2);font-size:13px;border:none;background:none;width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{background:rgba(16,185,129,.08);color:var(--text)}
.nav-item.active{background:rgba(16,185,129,.15);color:var(--primary);font-weight:600}
.nav-sec{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1.5px;padding:14px 14px 6px;font-weight:600}
.sb-foot{padding:14px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
.main{flex:1;margin-left:230px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10;gap:8px}
.topbar h2{font-size:18px;white-space:nowrap}
.menu-btn{display:none;background:none;border:none;color:var(--text);font-size:24px;padding:4px}
.content{padding:22px 26px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:20px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat .l{font-size:12px;color:var(--text3)}
.stat .v{font-size:22px;font-weight:700;margin-top:4px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;overflow-x:auto}
.card h3{font-size:14px;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 10px;color:var(--text3);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid rgba(30,58,95,.5)}
.btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:4px 8px;font-size:12px}
.input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);outline:none;font-size:14px;width:100%}
.input:focus{border-color:var(--primary)}
.search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 12px}
.search input{background:none;border:none;color:var(--text);outline:none;flex:1;font-size:14px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.b-g{background:rgba(16,185,129,.15);color:var(--primary)}
.b-r{background:rgba(239,68,68,.15);color:var(--red)}
.b-y{background:rgba(245,158,11,.15);color:var(--yellow)}
.empty{text-align:center;color:var(--text3);padding:40px}
.r{text-align:right}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:12px;color:var(--text3)}
.fg input,.fg select{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);outline:none;font-size:14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:560px;max-width:100%;max-height:88vh;overflow-y:auto}
.modal h3{margin-bottom:16px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
#toast{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:8px;font-size:13px;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.ok{background:#16a34a}.toast.err{background:#dc2626}.toast.warn{background:#d97706}.toast.info{background:#2563eb}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .overlay.open{display:block}
  .main{margin-left:0}
  .menu-btn{display:block}
  .topbar{padding:10px 14px}
  .topbar h2{font-size:15px}
  .content{padding:14px}
  .stats{grid-template-columns:1fr 1fr}
  .stat .v{font-size:18px}
  .form-grid{grid-template-columns:1fr}
  .modal{padding:16px}
}
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="logo-badge">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>

    <nav id="nav"></nav>
    <div class="sb-foot">

</div>

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function money(n){return Number(n||0).toLocaleString('fr-FR')+' Ar'}
function toast(msg,kind){var d=document.createElement('div');d.className='toast '+(kind||'info');d.textContent=msg;document.getElementById('toast').appendChild(d);setTimeout(function(){d.remove()},2600)}
function todayStr(){return new Date().toISOString().slice(0,10)}
function nowStr(){return new Date().toISOString().replace('T',' ').slice(0,19)}
function numEnLettres(n){
  n=Math.round(Number(n)||0);if(n===0)return 'zéro';
  var u=['','un','deux','trois','quatre','cinq','six','sept','huit','neuf','dix','onze','douze','treize','quatorze','quinze','seize','dix-sept','dix-huit','dix-neuf'];
  var d=['','','vingt','trente','quarante','cinquante','soixante','soixante','quatre-vingt','quatre-vingt'];
  function ss(x){if(x<20)return u[x];if(x<100){var q=Math.floor(x/10),r=x%10;if(q===7||q===9)return d[q]+(q===7&&r===1?' et ':'-')+u[10+r];if(q===8&&r===0)return 'quatre-vingts';return d[q]+(r===0?'':(r===1&&q!==8?' et ':'-')+u[r])}if(x<1000){var c=Math.floor(x/100),r2=x%100;return(c===1?'cent':u[c]+' cent'+(c>1&&r2===0?'s':''))+(r2===0?'':' '+ss(r2))}return String(x)}
  function big(x,label,plural){if(x===0)return '';return(x===1?(label==='mille'?'':'un '):ss(x)+' ')+label+(x>1&&plural?'s':'')+' '}
  var mil=Math.floor(n/1000000000),mm=n%1000000000,m=Math.floor(mm/1000000),mm2=mm%1000000,k=Math.floor(mm2/1000),r=mm2%1000;
  return(big(mil,'milliard',true)+big(m,'million',true)+big(k,'mille',false)+(r>0?ss(r):'')).trim();
}

function posFilter(){

  document.getElementById('posGrid').innerHTML=filtered.slice(0,20).map(function(p){return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;cursor:pointer" onclick="addToCart('+p.id+')">'

function addToCart(pid){
  var p=DB.produits().find(function(x){return x.id===pid});if(!p)return;
  var existing=_cart.find(function(c){return c.id===pid});
  if(existing){if(existing.qte<p.stock)existing.qte++;else{toast('Stock insuffisant','warn');return}}
  else _cart.push({id:pid,designation:p.designation,prix:p.prix_vente,qte:1});
  renderCart();toast(p.designation.split('(')[0].trim()+' ajouté','ok');
}
function renderCart(){
  var el=document.getElementById('cartView');if(!el)return;
  if(_cart.length===0){el.innerHTML='<div class="empty">Panier vide</div>';return}
  var total=_cart.reduce(function(s,c){return s+c.prix*c.qte},0);
  el.innerHTML='<table><thead><tr><th>Produit</th><th>Qté</th><th class="r">Montant</th><th></th></tr></thead><tbody>'
    +_cart.map(function(c,i){return '<tr><td>'+esc(c.designation.split('(')[0].trim())+'</td><td>'+c.qte+'</td><td class="r">'+money(c.prix*c.qte)+'</td><td><button class="btn btn-danger btn-sm" onclick="removeCart('+i+')">X</button></td></tr>'}).join('')
    +'<tr><td colspan="2" style="font-weight:700">TOTAL</td><td class="r" style="font-weight:700;color:var(--primary);font-size:16px">'+money(total)+'</td><td></td></tr></tbody></table>';
}
function removeCart(i){_cart.splice(i,1);renderCart()}
function validerVente(){
  if(_cart.length===0){toast('Panier vide','warn');return}
  var prods=DB.produits();var total=0;
  var lignes=_cart.map(function(c){
    var p=prods.find(function(x){return x.id===c.id});
    if(p)p.stock-=c.qte;
    var mt=c.prix*c.qte;total+=mt;
    return{designation:c.designation,quantite:c.qte,prix_unitaire:c.prix,montant:mt};
  });
  DB.saveProduits(prods);
  var ventes=DB.ventesCivil();var vid=DB.nextId('vente');
  var num='VC-'+todayStr().replace(/-/g,'')+'-'+String(vid).padStart(3,'0');
  ventes.push({id:vid,numero:num,date:nowStr(),total:total,lignes:lignes});
  DB.saveVentesCivil(ventes);
  _cart=[];toast('Vente '+num+' enregistrée — '+money(total),'ok');
  imprimerTicket({numero:num,date:nowStr(),total:total,lignes:lignes});
  loadCaisse();
}
function imprimerTicket(v){
  var cfg=DB.config();

function fillTravInfo(){
  var tid=Number(g('o_trav'));var t=DB.travailleurs().find(function(x){return x.id===tid});
  document.getElementById('o_sec').value=t?t.section_code:'';
  document.getElementById('o_typ').value=t?t.type_trav:'';
}
function addOrdItem(){
  var pid=Number(g('o_prod')),qty=Number(g('o_qty'))||1;
  var p=DB.produits().find(function(x){return x.id===pid});if(!p)return;
  var existing=_ordCart.find(function(c){return c.id===pid});
  if(existing)existing.qte+=qty;else _ordCart.push({id:pid,designation:p.designation,prix:p.prix_vente,qte:qty});
  renderOrdCart();
}
function renderOrdCart(){
  var el=document.getElementById('ordCartView');if(!el)return;
  if(_ordCart.length===0){el.innerHTML='<div class="empty" style="padding:16px">Aucun médicament ajouté</div>';return}
  var total=_ordCart.reduce(function(s,c){return s+c.prix*c.qte},0);
  el.innerHTML='<table><thead><tr><th>Produit</th><th>Qté</th><th class="r">P.U.</th><th class="r">Montant</th><th></th></tr></thead><tbody>'
    +_ordCart.map(function(c,i){return '<tr><td>'+esc(c.designation.split('(')[0].trim())+'</td><td>'+c.qte+'</td><td class="r">'+money(c.prix)+'</td><td class="r">'+money(c.prix*c.qte)+'</td><td><button class="btn btn-danger btn-sm" onclick="_ordCart.splice('+i+',1);renderOrdCart()">X</button></td></tr>'}).join('')
    +'<tr><td colspan="3" style="font-weight:700">TOTAL</td><td class="r" style="font-weight:700;color:var(--primary);font-size:16px">'+money(total)+'</td><td></td></tr></tbody></table>';
}
function validerOrdonnance(){
  if(_ordCart.length===0){toast('Ajoutez des médicaments','warn');return}
  var tid=Number(g('o_trav'));if(!tid){toast('Sélectionnez un travailleur','warn');return}
  var t=DB.travailleurs().find(function(x){return x.id===tid});if(!t)return;
  var soc=DB.societes().find(function(x){return x.id===t.societe_id});
  var total=_ordCart.reduce(function(s,c){return s+c.prix*c.qte},0);
  var prods=DB.produits();
  _ordCart.forEach(function(c){var p=prods.find(function(x){return x.id===c.id});if(p)p.stock-=c.qte});
  DB.saveProduits(prods);
  var ords=DB.ordonnances();var oid=DB.nextId('ordonnance');
  var patType=g('o_patient');
  var numPh='PH-'+new Date().getFullYear()+'-'+String(oid).padStart(4,'0');
  ords.push({id:oid,num_pharmacie:numPh,num_hopital:g('o_ord'),date_ord:g('o_date')||todayStr(),matricule:t.matricule,nom_prenom:t.nom_prenom,section_code:t.section_code,type_trav:t.type_trav,patient:patType,pharmacien:g('o_pharm'),total:total,societe:soc?soc.nom:'',lignes:_ordCart.slice()});
  DB.saveOrdonnances(ords);
  _ordCart=[];toast('Ordonnance enregistrée — '+money(total),'ok');loadVenteSociete();
}

  return Object.values(map);
}
