<title>SALAMA — Démonstration</title>
<style>
:root{--bg:#0a1628;--bg2:#0f1d32;--border:#1e3a5f;--primary:#10b981;--primary2:#059669;
 --text:#f8fafc;--text2:#94a3b8;--text3:#64748b;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--purple:#a855f7;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:var(--bg);color:var(--text)}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}
.hidden{display:none!important}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:360px;text-align:center}
.logo-badge{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 16px}
.login-card h1{font-size:24px;font-weight:800;color:var(--primary)}
.login-card .sub{font-size:11px;color:var(--primary);letter-spacing:3px;text-transform:uppercase;margin-bottom:24px}
.field{text-align:left;margin-bottom:14px}
.field label{font-size:12px;color:var(--text3);display:block;margin-bottom:4px}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);outline:none}
.field input:focus{border-color:var(--primary)}
.app{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;overflow:hidden}
.sidebar .brand{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sidebar .brand .b-ic{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;font-size:20px}
.sidebar .brand .b-t{font-size:17px;font-weight:700}
.sidebar .brand .b-s{font-size:9px;color:var(--primary);letter-spacing:2px;text-transform:uppercase}
nav{flex:1;padding:10px 8px;overflow-y:auto;min-height:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;color:var(--text2);font-size:13px;border:none;background:none;width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{background:rgba(16,185,129,.08);color:var(--text)}
.nav-item.active{background:rgba(16,185,129,.15);color:var(--primary);font-weight:600}
.nav-sec{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1.5px;padding:14px 14px 6px;font-weight:600}
.sb-foot{padding:14px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
.main{flex:1;margin-left:230px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10}
.topbar h2{font-size:18px}
.content{padding:22px 26px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat .l{font-size:12px;color:var(--text3)}
.stat .v{font-size:26px;font-weight:700;margin-top:4px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px}
.card h3{font-size:14px;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 10px;color:var(--text3);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid rgba(30,58,95,.5)}
tr:hover td{background:rgba(16,185,129,.04)}
.btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:4px 8px;font-size:12px}
.input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);outline:none}
.input:focus{border-color:var(--primary)}
.search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 12px}
.search input{background:none;border:none;color:var(--text);outline:none;flex:1}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.b-g{background:rgba(16,185,129,.15);color:var(--primary)}
.b-r{background:rgba(239,68,68,.15);color:var(--red)}
.b-y{background:rgba(245,158,11,.15);color:var(--yellow)}
.empty{text-align:center;color:var(--text3);padding:40px}
.r{text-align:right}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:12px;color:var(--text3)}
.fg input,.fg select{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);outline:none}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:560px;max-height:88vh;overflow-y:auto}
.modal h3{margin-bottom:16px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
#toast{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:8px;font-size:13px;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.ok{background:#16a34a}.toast.err{background:#dc2626}.toast.warn{background:#d97706}.toast.info{background:#2563eb}
.demo-badge{position:fixed;top:12px;right:12px;z-index:300;background:linear-gradient(135deg,#a855f7,#6366f1);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:1px;box-shadow:0 4px 15px rgba(168,85,247,.4)}
@media(max-width:768px){
  .sidebar{width:60px}.sidebar .brand .b-t,.sidebar .brand .b-s,.nav-item span,.sb-foot div{display:none}
  .sidebar .brand{padding:12px;justify-content:center}.sidebar .brand .b-ic{width:36px;height:36px}
  nav{padding:6px}.nav-item{padding:8px;justify-content:center}.nav-item svg{margin:0}
  .main{margin-left:60px}.topbar h2{font-size:15px}.content{padding:14px}
  .stats{grid-template-columns:1fr 1fr}.stat .v{font-size:20px}
}
</style>
</head>

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function money(n){return Number(n||0).toLocaleString('fr-FR')+' Ar'}
function toast(msg,kind){var d=document.createElement('div');d.className='toast '+(kind||'info');d.textContent=msg;document.getElementById('toast').appendChild(d);setTimeout(function(){d.remove()},2600)}
function numEnLettres(n){
  n=Math.round(Number(n)||0);if(n===0)return 'zéro';
  var u=['','un','deux','trois','quatre','cinq','six','sept','huit','neuf','dix','onze','douze','treize','quatorze','quinze','seize','dix-sept','dix-huit','dix-neuf'];
  var d=['','','vingt','trente','quarante','cinquante','soixante','soixante','quatre-vingt','quatre-vingt'];
  function ss(x){
    if(x<20)return u[x];
    if(x<100){var q=Math.floor(x/10),r=x%10;if(q===7||q===9)return d[q]+(q===7&&r===1?' et ':'-')+u[10+r];if(q===8&&r===0)return 'quatre-vingts';return d[q]+(r===0?'':(r===1&&q!==8?' et ':'-')+u[r])}
    if(x<1000){var c=Math.floor(x/100),r=x%100;return(c===1?'cent':u[c]+' cent'+(c>1&&r===0?'s':''))+(r===0?'':' '+ss(r))}
    return String(x);
  }
  function big(x,label,plural){if(x===0)return '';return(x===1?(label==='mille'?'':'un '):ss(x)+' ')+label+(x>1&&plural?'s':'')+' '}
  var mil=Math.floor(n/1000000000),mm=n%1000000000,m=Math.floor(mm/1000000),mm2=mm%1000000,k=Math.floor(mm2/1000),r=mm2%1000;
  return(big(mil,'milliard',true)+big(m,'million',true)+big(k,'mille',false)+(r>0?ss(r):'')).trim();
}

function svgIcon(paths,sz){
  sz=sz||18;
  var ps=paths.split('|').map(function(p){
    if(p.trim().startsWith('M')&&p.indexOf(' ')>0)return '<path d="'+p+'"/>';
    return '<path d="'+p+'"/>';
  }).join('');
  return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">'+ps+'</svg>';
}

function showFactureMens(){
  var grouped=_groupFacture(ORDONNANCES);
  var tot=ORDONNANCES.reduce(function(s,o){return s+o.total},0);
  var html='<table><thead><tr><th>TYPE</th><th>FAMILLE</th><th>TRAVAILLEUR</th><th class="r">Nombre</th><th class="r">Montant hors Taxe</th></tr></thead><tbody>';
  grouped.forEach(function(g){
    html+='<tr><td>'+esc(g.type)+'</td><td>'+esc(g.famille)+'</td><td>'+esc(g.travailleur)+'</td><td class="r">'+g.nombre+'</td><td class="r" style="font-weight:600">'+Number(g.total).toLocaleString('fr-FR')+'</td></tr>';
  });
  html+='<tr style="background:#4c1d95;color:#fff"><td colspan="3" style="font-weight:700">TOTAL</td><td class="r" style="font-weight:700">'+ORDONNANCES.length+'</td><td class="r" style="font-weight:700">'+Number(tot).toLocaleString('fr-FR')+'</td></tr>';
  html+='</tbody></table>';
  document.getElementById('fmTable').innerHTML=html;
}
function _groupFacture(lignes){
  var map={};
  lignes.forEach(function(l){
    var type=l.type_trav||'—';
    var famille=l.nom_famille||'—';
    var travailleur=l.nom_prenom||'—';
    var k=type+'|'+famille+'|'+travailleur;
    if(!map[k])map[k]={type:type,famille:famille,travailleur:travailleur,nombre:0,total:0};
    map[k].nombre++;map[k].total+=Number(l.total);
  });
  return Object.values(map);
}
